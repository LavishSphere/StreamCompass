name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Python (flake8 + black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Run flake8
        run: |
          cd backend
          flake8 . --max-line-length=100 --exclude=venv,__pycache__

      - name: Run black (check mode)
        run: |
          cd backend
          black . --check --line-length=100

  lint-frontend:
    name: Lint JavaScript (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint